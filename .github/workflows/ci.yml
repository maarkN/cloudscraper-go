name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [oldstable, stable]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "These files need gofmt -s:"; echo "$out"; exit 1
          fi
      - name: test (race, offline)
        run: go test -race -short ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Install golangci-lint v2 built with the runner's Go, so it matches the
      # module's go directive (avoids the "built with older Go" config error).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
